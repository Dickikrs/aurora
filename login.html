<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Member - Aurorastore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast" class="fixed top-5 right-5 z-50 hidden px-6 py-3 rounded-xl text-white shadow-lg transition-opacity duration-300"></div>

<div id="loader" class="loader-container">
    <div class="planet"></div>
</div>

<div class="glass-card">
    <h2 class="text-3xl font-bold mb-6 text-white text-center">Login Member</h2>
    
    <form id="loginForm" class="space-y-4">
        <div class="text-white">
            <label class="block text-sm">Email</label>
            <input type="email" id="email" required placeholder="email@example.com"
                class="w-full p-3 rounded-xl mt-1 outline-none text-gray-800">
        </div>
        
        <div class="relative text-white">
            <label class="block text-sm">Password</label>
            <div class="relative mt-1">
                <input type="password" id="password" required minlength="6" placeholder="********"
                    class="w-full p-3 rounded-xl outline-none text-gray-800 pr-10">
                <span onclick="togglePassword()" class="absolute right-4 top-3.5 cursor-pointer text-gray-500 hover:text-blue-500 transition">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </span>
            </div>
        </div>

        <button type="submit" id="loginBtn" class="w-full text-white p-3 rounded-xl font-semibold mt-4 hover:opacity-90 transition">Login</button>
    </form>

    <div class="mt-6 text-center text-white">
        <p class="text-sm">Belum punya akun?</p>
        <a href="index.html" class="font-bold underline">Daftar di sini</a>
    </div>
</div>

<div class="floating-astronaut">
    <img src="https://pngimg.com/uploads/astronaut/astronaut_PNG41.png" alt="Astronaut">
</div>

<script>
    // 1. Loading Screen
    window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 500);
    });

    // 2. Fungsi Toast
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `fixed top-5 right-5 z-50 px-6 py-3 rounded-xl text-white shadow-lg transition-all duration-500 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // 3. Fungsi Toggle Password
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            passwordInput.type = "password";
            eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    // 4. Form Login Submission
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDwLZQHFxlzauMn1USwiuJzig9amx5dRDiHO1P_BGXHebCzZ5lsNMsWwyyG0Huh991/exec'; 
    
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('loginBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.innerText = "Memproses...";
        btn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "login", 
                    email: email, 
                    password: password 
                })
            });
            const result = await response.json();

            if (result.status === "success") {
                showToast("Login Berhasil! Mengalihkan...", "success");
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userName', result.nama);
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
            } else {
                showToast(result.message || "Login Gagal!", "error");
                btn.innerText = "Login";
                btn.disabled = false;
            }
        } catch (err) {
            showToast("Server error, coba lagi nanti.", "error");
            btn.innerText = "Login";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
