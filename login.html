<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Store - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-container { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 24px; color: #00adb5; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaaaaa; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #252525; color: #fff; font-size: 16px; }
        .input-group input:focus { border-color: #00adb5; outline: none; }
        button { width: 100%; padding: 12px; background: #00adb5; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background: #007a80; }
        .error-msg { color: #ff5252; text-align: center; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>AURORA STORE</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="username">Username / Email</label>
            <input type="text" id="username" placeholder="Masukkan username atau email" required>
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" id="btnLogin">Masuk</button>
        <div id="errorMsg" class="error-msg"></div>
    </form>
</div>

<script>
    // MASUKKAN URL /dev DARI PROJECT BARU LO DI SINI
    const API_URL = "https://script.google.com/macros/s/AKfycby-yrQviIoIeH0pPL5QmMI1L5hdI9zQ19E0Ym7VLHCHF5QQUgSkleqXpSrvtXVz1rkC/exec";

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const usernameVal = document.getElementById('username').value.trim();
        const passwordVal = document.getElementById('password').value.trim();
        const btnLogin = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('errorMsg');

        btnLogin.innerText = "Memverifikasi...";
        btnLogin.disabled = true;
        errorMsg.style.display = "none";

        // Menggunakan method POST dengan format text/plain agar terhindar dari pemblokiran CORS pra-perizinan browser
        fetch(API_URL, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({
                action: "login",
                username: usernameVal,
                password: passwordVal
            })
        })
        .then(response => {
            if (!response.ok) throw new Error("Koneksi gagal atau diblokir oleh sistem keamanan browser.");
            return response.json();
        })
        .then(data => {
            btnLogin.innerText = "Masuk";
            btnLogin.disabled = false;

            if (data.success) {
                // Simpan username asli dari database ke dalam session local browser
                localStorage.setItem("user_aurora", data.user.username);
                alert("Login Berhasil! Selamat datang, " + data.user.username);
                window.location.href = "index.html";
            } else {
                // TERTOLAK KLO USER TIDAK TERDAFTAR / ASAL-ASALAN
                errorMsg.innerText = data.message || "Username atau Password salah.";
                errorMsg.style.display = "block";
            }
        })
        .catch(err => {
            btnLogin.innerText = "Masuk";
            btnLogin.disabled = false;
            errorMsg.innerText = "Detail Error: " + err.message + "\n(Jika pakai localhost di HP, pastikan server lokal lo mendukung HTTPS atau tes langsung lewat GitHub Pages).";
            errorMsg.style.display = "block";
        });
    });
</script>
</body>
</html>
