<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Store - Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .logo { color: #00adb5; font-weight: bold; font-size: 20px; }
        .user-info { text-align: right; }
        .saldo-box { font-size: 18px; color: #28a745; font-weight: bold; margin-top: 5px; }
        .logout-btn { background: #ff5252; padding: 5px 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-size: 12px; margin-top: 5px; }
        
        h3 { margin-bottom: 15px; color: #00adb5; }
        .produk-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .produk-card { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .produk-title { font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .produk-meta { font-size: 13px; color: #aaa; margin-bottom: 12px; }
        .produk-harga { font-size: 18px; color: #ffc107; font-weight: bold; margin-bottom: 12px; }
        .btn-beli { background: #00adb5; border: none; padding: 10px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-beli:hover { background: #007a80; }
        .loading { text-align: center; color: #aaa; padding: 4px; width: 100%; grid-column: 1/-1; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">AURORA STORE</div>
    <div class="user-info">
        <div id="txtUsername" style="font-weight: bold;">Memuat user...</div>
        <div id="txtSaldo" class="saldo-box">Rp 0</div>
        <button class="logout-btn" onclick="logout()">Keluar</button>
    </div>
</div>

<h3>Daftar Produk Aktif</h3>
<div class="produk-container" id="gridProduk">
    <div class="loading" id="txtLoading">Sedang memuat produk dari Google Sheet...</div>
</div>

<script>
    // GANTI dengan URL /dev dari project Apps Script baru lo
    const API_URL = "https://script.google.com/macros/s/AKfycby-yrQviIoIeH0pPL5QmMI1L5hdI9zQ19E0Ym7VLHCHF5QQUgSkleqXpSrvtXVz1rkC/exec";
    
    // 1. PROTEKSI HALAMAN: Cek apakah user sudah login
    const sessionUser = localStorage.getItem("user_aurora");
    if (!sessionUser) {
        alert("Anda belum login! Silakan login terlebih dahulu.");
        window.location.href = "login.html";
    } else {
        document.getElementById("txtUsername").innerText = "Halo, " + sessionUser;
        // Jalankan penarikan data secara paralel
        loadSaldo(sessionUser);
        loadProduk();
    }

    // 2. FUNGSI GET SALDO
    function loadSaldo(username) {
        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "ambil_saldo", username: username })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                // Format rupiah sederhana
                document.getElementById("txtSaldo").innerText = "Rp " + data.saldo.toLocaleString('id-ID');
            } else {
                document.getElementById("txtSaldo").innerText = "Gagal mengambil saldo";
            }
        })
        .catch(err => console.error("Error saldo:", err));
    }

    // 3. FUNGSI GET PRODUK
    function loadProduk() {
        const gridProduk = document.getElementById("gridProduk");
        const txtLoading = document.getElementById("txtLoading");

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "tarik_produk" })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success && data.data.length > 0) {
                gridProduk.innerHTML = ""; // Bersihkan teks loading
                
                data.data.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "produk-card";
                    card.innerHTML = `
                        <div>
                            <div class="produk-title">${item.nama}</div>
                            <div class="produk-meta">Kode: ${item.kode} | Brand: ${item.brand}</div>
                        </div>
                        <div>
                            <div class="produk-harga">Rp ${item.harga.toLocaleString('id-ID')}</div>
                            <button class="btn-beli" onclick="beliProduk('${item.kode}', '${item.nama}', ${item.harga})">Beli Sekarang</button>
                        </div>
                    `;
                    gridProduk.appendChild(card);
                });
            } else {
                txtLoading.innerText = "Tidak ada produk aktif yang ditemukan di sheet.";
            }
        })
        .catch(err => {
            txtLoading.innerText = "Gagal memuat produk: " + err.message;
        });
    }

    function beliProduk(kode, nama, harga) {
        alert(`Riset Tahap 1 Sukses! Anda memilih produk:\n[${kode}] - ${nama}\nHarga: Rp ${harga.toLocaleString('id-ID')}\n\nFungsi pemotongan saldo belum diaktifkan di tahap riset data ini.`);
    }

    function logout() {
        localStorage.removeItem("user_aurora");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
