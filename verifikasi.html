<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi OTP - Aurorastore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="toast" class="fixed top-5 right-5 z-50 hidden px-6 py-3 rounded-xl text-white shadow-lg transition-opacity duration-300"></div>

<div id="loader" class="loader-container">
    <div class="planet"></div>
</div>

<div class="glass-card text-center">
    <h2 class="text-3xl font-bold mb-2 text-white">Verifikasi OTP</h2>
    <p class="text-white mb-6 text-sm opacity-90">Masukkan 6 digit kode yang telah dikirim ke email kamu.</p>
    
    <form id="verifikasiForm" class="space-y-4">
        <div>
            <input type="text" id="otp" maxlength="6" required placeholder="000000" 
                class="w-full p-4 text-center text-2xl font-bold rounded-xl outline-none text-gray-800 tracking-[0.5em] shadow-inner">
        </div>
        <button type="submit" id="submitBtn" class="w-full bg-green-500 text-white p-3 rounded-xl font-semibold hover:bg-green-600 transition shadow-lg">
            Verifikasi & Daftar
        </button>
    </form>
</div>

<script>
    // 1. Loading & Session Check
    window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 500);
        
        // Cek apakah data pendaftaran ada
        if (!sessionStorage.getItem('tempUser')) {
            showToast("Sesi habis, silakan daftar ulang.", "error");
            setTimeout(() => { window.location.href = "index.html"; }, 2000);
        }
    });

    // 2. Fungsi Toast
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `fixed top-5 right-5 z-50 px-6 py-3 rounded-xl text-white shadow-lg transition-all duration-500 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // 3. Form Verifikasi
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDwLZQHFxlzauMn1USwiuJzig9amx5dRDiHO1P_BGXHebCzZ5lsNMsWwyyG0Huh991/exec';

    document.getElementById('verifikasiForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const otp = document.getElementById('otp').value;
        const tempUser = JSON.parse(sessionStorage.getItem('tempUser'));
        
        btn.innerText = "Memproses...";
        btn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "verify", 
                    email: tempUser.email, 
                    otp: otp,
                    nama: tempUser.nama,
                    password: tempUser.password,
                    wa: tempUser.wa
                })
            });

            const result = await response.json();
            
            if (result.status === "success") {
                showToast("Pendaftaran Berhasil! Silakan Login.", "success");
                sessionStorage.removeItem('tempUser'); // Hapus setelah sukses
                setTimeout(() => { window.location.href = "login.html"; }, 1500);
            } else {
                showToast(result.message || "Kode OTP salah!", "error");
                btn.innerText = "Verifikasi & Daftar";
                btn.disabled = false;
            }
        } catch (error) {
            showToast("Gagal menghubungi server.", "error");
            btn.innerText = "Verifikasi & Daftar";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
