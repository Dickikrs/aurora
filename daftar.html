<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Member</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="card">
    <h3 class="text-center mb-4">Daftar Member</h3>
    <div id="alertBox" class="alert d-none"></div>
    
    <form id="daftarForm">
      <div class="mb-3">
        <label class="form-label">Username Baru</label>
        <input type="text" id="username" class="form-control" required autocomplete="off">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" id="btnSubmit" class="btn btn-success w-100">Daftar Sekarang</button>
    </form>
    
    <div class="text-center mt-3">
      <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwaFBjSvjKHlTx7A2gj6KXac9fMoCgUb1Ox3j8fyw6FF_tI7rXYzK_Td2qmSdfHyTf3CA/exec"; 

    document.getElementById('daftarForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = document.getElementById('btnSubmit');
      const alertBox = document.getElementById('alertBox');
      
      btn.disabled = true;
      btn.innerText = 'Mendaftar...';
      
      fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'daftar', username: user, password: pass })
      })
      .then(res => res.json())
      .then(res => {
        btn.disabled = false;
        btn.innerText = 'Daftar Sekarang';
        
        alertBox.className = "alert " + (res.success ? "alert-success" : "alert-danger");
        alertBox.innerText = res.message;
        alertBox.classList.remove('d-none');
        
        if(res.success) {
          document.getElementById('daftarForm').reset();
          setTimeout(() => { window.location.href = "login.html"; }, 2000);
        }
      })
      .catch(err => {
        btn.disabled = false;
        btn.innerText = 'Daftar Sekarang';
        alertBox.className = "alert alert-danger";
        alertBox.innerText = "Terjadi kesalahan jaringan!";
        alertBox.classList.remove('d-none');
      });
    });
  </script>
</body>
</html>
