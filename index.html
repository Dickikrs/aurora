<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar ke Aurorastore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loader Screen (Satu saja, tidak perlu duplikat) -->
<div id="loader" class="loader-container">
    <div class="planet"></div>
</div>

<div class="glass-card">
    <h2 class="text-3xl font-bold mb-6 text-white text-center">Daftar Aurorastore</h2>
    
    <form id="daftarForm" class="space-y-4">
        <div class="text-white">
            <label class="block text-sm">Nama Lengkap</label>
            <input type="text" id="nama" required class="w-full p-3 rounded-xl mt-1 outline-none text-gray-800">
        </div>
        <div class="text-white">
            <label class="block text-sm">Email</label>
            <input type="email" id="email" required placeholder="email@example.com" class="w-full p-3 rounded-xl mt-1 outline-none text-gray-800">
        </div>
        <div class="relative text-white">
            <label class="block text-sm">Password</label>
            <div class="relative mt-1">
                <input type="password" id="password" requered minlegth="6" required placeholder="********" class="w-full p-3 rounded-xl outline-none text-gray-800 pr-10">
                <span onclick="togglePassword()" class="absolute right-4 top-3.5 cursor-pointer text-gray-500 hover:text-blue-500 transition">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </span>
            </div>
        </div>
        <div class="text-white">
            <label class="block text-sm">Nomor Whatsapp</label>
            <input type="tel" id="wa" required class="w-full p-3 rounded-xl mt-1 outline-none text-gray-800">
        </div>
        <button type="submit" class="w-full text-white p-3 rounded-xl font-semibold mt-4 hover:opacity-90 transition">
            Lanjut Verifikasi OTP
        </button>
    </form>

    <div class="mt-6 text-center text-white">
        <p class="text-sm">Sudah punya akun?</p>
        <a href="login.html" class="font-bold underline">Login di sini</a>
    </div>
</div>

<!-- Astronot -->
<div class="floating-astronaut">
    <img src="https://pngimg.com/uploads/astronaut/astronaut_PNG41.png" alt="Astronaut">
</div>

<script>
    // 1. Fungsi Loading Screen
    window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.opacity = "0";
        setTimeout(() => { loader.style.display = "none"; }, 500);
    });

    // 2. Fungsi Ikon Mata
    function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            passwordInput.type = "password";
            eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    // 3. Fungsi Toast Notification
    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `fixed top-5 right-5 z-50 px-6 py-3 rounded-xl text-white shadow-lg transition-all duration-500 ${
            type === 'error' ? 'bg-red-500' : 'bg-green-500'
        }`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // 4. Form Submission
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDwLZQHFxlzauMn1USwiuJzig9amx5dRDiHO1P_BGXHebCzZ5lsNMsWwyyG0Huh991/exec';
    
    document.getElementById('daftarForm').onsubmit = async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button');
        const userData = {
            nama: document.getElementById('nama').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            wa: document.getElementById('wa').value
        };

        btn.innerText = "Memproses...";
        btn.disabled = true;

        try {
            // A. Cek duplikasi email
            const checkResponse = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "checkEmail", email: userData.email })
            });
            const check = await checkResponse.json();

            if (check.status === "error") {
                showToast(check.message, 'error');
                btn.innerText = "Lanjut Verifikasi OTP";
                btn.disabled = false;
                return;
            }

            // B. Simpan data sementara & kirim OTP
            sessionStorage.setItem('tempUser', JSON.stringify(userData));

await fetch(SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify({ action: "sendOTP", email: userData.email })
});

            // C. Pindah ke halaman verifikasi
            window.location.href = "verifikasi.html";
            
        } catch (err) {
    // Kita ganti ini supaya tahu error aslinya apa
    alert("Error Detail: " + err.message); 
    btn.innerText = "Lanjut Verifikasi OTP";
    btn.disabled = false;
}
    };
</script>

<!-- Toast Notification -->
<div id="toast" class="fixed top-5 right-5 z-50 hidden px-6 py-3 rounded-xl text-white shadow-lg transition-opacity duration-300"></div>

</body>
</html>
